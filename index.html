<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: #0d0f1c;
      --surface2: #131628;
      --border: rgba(148,163,255,0.08);
      --border2: rgba(148,163,255,0.15);
      --text: #dde1ff;
      --muted: #6b7280;
      --muted2: #8892a4;
      --accent: #6ee7b7;
      --accent2: #818cf8;
      --link: #60a5fa;
      --yt: #f87171;
      --done: #4ade80;
      --done-bg: rgba(74,222,128,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    body {
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 0%, rgba(99,102,241,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 100%, rgba(110,231,183,0.04) 0%, transparent 60%);
    }

    .app { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── HEADER ── */
    .header { margin-bottom: 2rem; }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-area { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span { color: var(--accent2); }

    .header-sub {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-group { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #6d28d9);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted2);
      border: 1px solid var(--border2);
    }

    .btn-ghost:hover { color: var(--text); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 1.25rem 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem;
      text-align: center;
    }

    .stat-card .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .stat-card .stat-val.done  { color: var(--done); }
    .stat-card .stat-val.rem   { color: #f97316; }
    .stat-card .stat-val.pct   { color: var(--accent2); }

    .stat-card .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ── OVERALL PROGRESS ── */
    .overall-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .overall-progress label {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .prog-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5, #6ee7b7);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .prog-pct {
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 9px 12px 9px 36px;
      font-size: 0.85rem;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent2); }

    /* ── CHAPTERS / SECTIONS ── */
    .chapters { display: flex; flex-direction: column; gap: 2rem; }

    .chapter-section {}

    /* ── CHAPTER HEADER ── */
    .ch-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
    }

    .ch-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .ch-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .ch-subtitle b { color: var(--done); }
    .ch-subtitle .pending-count { color: #f97316; }

    .ch-prog-mini {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ch-prog-track {
      width: 70px;
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .ch-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #6ee7b7, #4ade80);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .ch-prog-pct {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      min-width: 28px;
    }

    /* ── HORIZONTAL SLIDER ── */
    .q-slider {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .q-slider::-webkit-scrollbar { height: 4px; }
    .q-slider::-webkit-scrollbar-track { background: var(--surface2); border-radius: 99px; }
    .q-slider::-webkit-scrollbar-thumb { background: rgba(148,163,255,0.2); border-radius: 99px; }
    .q-slider::-webkit-scrollbar-thumb:hover { background: rgba(148,163,255,0.35); }

    /* ── QUESTION CARD ── */
    .q-card {
      flex: 0 0 220px;
      scroll-snap-align: start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: default;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .q-card:hover { border-color: var(--border2); background: var(--surface2); }

    .q-card.solved {
      border-color: rgba(74,222,128,0.2);
      background: var(--done-bg);
      opacity: 0.6;
    }

    .q-num {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }

    .q-title {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }

    .q-card.solved .q-title {
      text-decoration: line-through;
      color: var(--muted);
      text-decoration-color: rgba(107,114,128,0.4);
    }

    .q-sub-label {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .q-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-top: 2px;
    }

    .q-links { display: flex; gap: 5px; flex-wrap: wrap; }

    .q-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 7px;
      border-radius: 5px;
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid transparent;
      transition: all 0.12s;
    }

    .q-link:hover { transform: translateY(-1px); }

    .lk-lc  { background: rgba(249,115,22,0.1); color: #f97316; border-color: rgba(249,115,22,0.2); }
    .lk-lc:hover  { background: rgba(249,115,22,0.18); }
    .lk-yt  { background: rgba(248,113,113,0.1); color: #f87171; border-color: rgba(248,113,113,0.2); }
    .lk-yt:hover  { background: rgba(248,113,113,0.18); }
    .lk-gfg { background: rgba(34,197,94,0.1);  color: #22c55e; border-color: rgba(34,197,94,0.2); }
    .lk-gfg:hover { background: rgba(34,197,94,0.18); }
    .lk-gen { background: rgba(148,163,255,0.08); color: var(--accent2); border-color: rgba(148,163,255,0.15); }
    .lk-gen:hover { background: rgba(148,163,255,0.15); }

    /* checkbox */
    .q-cb {
      width: 17px; height: 17px;
      border-radius: 5px;
      border: 1.5px solid var(--border2);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s;
      background: transparent;
    }

    .q-cb:checked { background: var(--done); border-color: var(--done); }

    .q-cb:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1.5px;
      width: 6px; height: 10px;
      border: 2px solid #07080f;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .q-cb:hover:not(:checked) { border-color: var(--accent2); }

    /* ── DIVIDER ── */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 0.5rem 0 0;
    }

    /* ── EMPTY / STATUS ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state .big { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; }
    .empty-state .hint { font-size: 0.78rem; margin-top: 0.5rem; font-family: 'JetBrains Mono', monospace; }

    .no-pending {
      font-size: 0.78rem;
      color: var(--done);
      font-family: 'JetBrains Mono', monospace;
      padding: 8px 0;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(7,8,15,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    .loading-overlay.show { display: flex; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(129,140,248,0.2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.85rem;
      color: var(--muted2);
      font-family: 'JetBrains Mono', monospace;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 0.82rem;
      color: var(--text);
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(74,222,128,0.3); color: var(--done); }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .header-top { flex-direction: column; }
      .btn-group { width: 100%; }
      .q-card { flex: 0 0 180px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>DSA <span>Tracker</span></h1>
          <div class="header-sub" id="sheet-label">No sheet loaded · click Load Sheet</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="load-btn" onclick="loadSheet()">↓ Load Sheet</button>
        <button class="btn btn-ghost" onclick="clearLocal()">Reset</button>
      </div>
    </div>

    <!-- Overall progress -->
    <div class="overall-progress" style="margin-top:1.25rem;">
      <label id="prog-label">0 / 0 solved</label>
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-val done" id="stat-done">—</div>
        <div class="stat-label">Solved</div>
      </div>
      <div class="stat-card">
        <div class="stat-val rem" id="stat-rem">—</div>
        <div class="stat-label">Remaining</div>
      </div>
      <div class="stat-card">
        <div class="stat-val pct" id="stat-pct">—</div>
        <div class="stat-label">Progress</div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" class="search-input" id="search-input" placeholder="Search pending problems…" oninput="handleSearch(this.value)">
    </div>
  </div>

  <!-- CONTENT -->
  <div class="chapters" id="chapters-container"></div>

  <!-- EMPTY STATE -->
  <div id="empty-state" class="empty-state">
    <div class="big">📘</div>
    <p>No sheet loaded yet.</p>
    <div class="hint">Click "Load Sheet" to fetch data from Google Sheets</div>
  </div>

</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Fetching sheet data…</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1gRGKixHVIhP5afZirR4jnLX1PqIE-HXL05g1-XfgwMQ/gviz/tq?tqx=out:csv";
const STORAGE_KEY = "dsa_tracker_v2";

let chapters = [];
let searchQuery = '';

/* ─── PERSISTENCE ─── */
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(chapters)); }

function loadFromStorage() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) { chapters = JSON.parse(d); return true; }
  } catch(e) {}
  return false;
}

/* ─── CSV PARSING ─── */
function parseCSV(text) {
  return text
    .split(/\r?\n/)
    .map(line => line.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()))
    .filter(row => row.some(cell => cell !== ''));
}

function buildChapters(rows) {
  const result = [];
  let currentChapter = null;
  let currentSub = null;
  let itemId = 0;

  const isProgressRow = t => /^completed:\s*\d+\/\d+/i.test(t);
  const isChapter     = t => /^\d+\.\s+/.test(t);
  const isSubChapter  = t => /^\d+\.\d+/.test(t);
  const isHeader      = t => t.toLowerCase().includes("problem statement") || t.toLowerCase().includes("leetcode / gfg");

  rows.forEach(row => {
    const rawStatus = (row[0] || '').trim();
    const problem   = (row[1] || '').trim();
    const link      = (row[2] || '').trim();
    const youtube   = (row[3] || '').trim();

    if (!problem || isProgressRow(problem) || isHeader(problem)) return;

    if (isChapter(problem)) {
      currentChapter = { id: 'ch_' + result.length, title: problem, subs: [] };
      result.push(currentChapter);
      currentSub = null;
      return;
    }

    if (isSubChapter(problem)) {
      if (!currentChapter) { currentChapter = { id: 'ch_0', title: 'General', subs: [] }; result.push(currentChapter); }
      currentSub = { id: currentChapter.id + '_s' + currentChapter.subs.length, title: problem, items: [] };
      currentChapter.subs.push(currentSub);
      return;
    }

    const status = rawStatus.toLowerCase().includes('completed') ? 'Completed' : 'Pending';
    if (!currentChapter) { currentChapter = { id: 'ch_0', title: 'General', subs: [] }; result.push(currentChapter); }
    if (!currentSub)     { currentSub = { id: currentChapter.id + '_s0', title: 'Problems', items: [] }; currentChapter.subs.push(currentSub); }

    currentSub.items.push({ id: itemId++, status, problem, link, youtube });
  });

  return result;
}

/* ─── LINK CLASSIFICATION ─── */
function classifyLink(url) {
  if (!url) return null;
  try {
    const host = new URL(url).hostname.replace('www.','');
    if (host.includes('leetcode'))   return { cls: 'lk-lc',  label: 'LC' };
    if (host.includes('youtube') || host.includes('youtu.be')) return { cls: 'lk-yt', label: 'YT' };
    if (host.includes('geeksforgeeks') || host.includes('gfg')) return { cls: 'lk-gfg', label: 'GFG' };
    return { cls: 'lk-gen', label: 'Link' };
  } catch(e) { return { cls: 'lk-gen', label: 'Link' }; }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── STATS ─── */
function getStats() {
  let total = 0, done = 0;
  chapters.forEach(ch => ch.subs.forEach(s => s.items.forEach(it => {
    total++;
    if (it.status === 'Completed') done++;
  })));
  return { total, done, rem: total - done };
}

function updateStats() {
  const { total, done, rem } = getStats();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-total').textContent = total || '—';
  document.getElementById('stat-done').textContent  = done  || '—';
  document.getElementById('stat-rem').textContent   = rem   || '—';
  document.getElementById('stat-pct').textContent   = total ? pct + '%' : '—';
  document.getElementById('prog-label').textContent = `${done} / ${total} solved`;
  document.getElementById('prog-fill').style.width  = pct + '%';
  document.getElementById('prog-pct').textContent   = pct + '%';
}

/* ─── RENDER ─── */
function render() {
  const container = document.getElementById('chapters-container');
  const empty     = document.getElementById('empty-state');

  if (!chapters.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    updateStats();
    return;
  }

  empty.style.display = 'none';
  container.innerHTML = '';

  const sq = searchQuery.toLowerCase();

  chapters.forEach(ch => {
    // gather all pending items (optionally filtered by search)
    const allItems = ch.subs.flatMap(s => s.items.map(it => ({ ...it, subTitle: s.title })));
    const total    = allItems.length;
    const done     = allItems.filter(i => i.status === 'Completed').length;
    const pct      = total ? Math.round(done / total * 100) : 0;

    const pendingItems = allItems.filter(it =>
      it.status !== 'Completed' &&
      (!sq || it.problem.toLowerCase().includes(sq))
    );

    if (!pendingItems.length) return; // skip chapters with no pending

    const sec = document.createElement('div');
    sec.className = 'chapter-section';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'ch-header';
    hdr.innerHTML = `
      <div class="ch-title">${escHtml(ch.title)}</div>
      <div class="ch-subtitle">
        <b>${done}</b>/${total} solved &nbsp;·&nbsp;
        <span class="pending-count">${pendingItems.length} pending</span>
      </div>
      <div class="ch-prog-mini">
        <div class="ch-prog-track">
          <div class="ch-prog-fill" style="width:${pct}%"></div>
        </div>
        <span class="ch-prog-pct">${pct}%</span>
      </div>
    `;
    sec.appendChild(hdr);

    // Horizontal slider
    const slider = document.createElement('div');
    slider.className = 'q-slider';

    pendingItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'q-card' + (item.status === 'Completed' ? ' solved' : '');
      card.dataset.itemId = item.id;

      let linksHtml = '';
      if (item.link) {
        const info = classifyLink(item.link);
        if (info) linksHtml += `<a class="q-link ${info.cls}" href="${escHtml(item.link)}" target="_blank" rel="noopener">${info.label}</a>`;
      }
      if (item.youtube) {
        linksHtml += `<a class="q-link lk-yt" href="${escHtml(item.youtube)}" target="_blank" rel="noopener">YT</a>`;
      }

      const showSub = item.subTitle && item.subTitle !== 'Problems';

      card.innerHTML = `
        <div class="q-num">#${item.id + 1}</div>
        <div class="q-title">${escHtml(item.problem)}</div>
        ${showSub ? `<div class="q-sub-label">${escHtml(item.subTitle)}</div>` : ''}
        <div class="q-footer">
          <div class="q-links">${linksHtml}</div>
          <input type="checkbox" class="q-cb" ${item.status === 'Completed' ? 'checked' : ''} onchange="toggleItem(${item.id})">
        </div>
      `;

      slider.appendChild(card);
    });

    sec.appendChild(slider);
    sec.appendChild(Object.assign(document.createElement('div'), { className: 'section-divider' }));
    container.appendChild(sec);
  });

  if (!container.children.length) {
    container.innerHTML = `<div class="empty-state"><div class="big">🎉</div><p>No pending problems${sq ? ' matching "' + escHtml(searchQuery) + '"' : ''}!</p></div>`;
  }

  updateStats();
}

/* ─── TOGGLE ─── */
function toggleItem(itemId) {
  let changed = null;
  chapters.forEach(ch => ch.subs.forEach(s => s.items.forEach(it => {
    if (it.id === itemId) { it.status = it.status === 'Completed' ? 'Pending' : 'Completed'; changed = it; }
  })));
  save();
  render();
  if (changed) showToast(changed.status === 'Completed' ? '✓ Marked as solved!' : 'Moved back to pending', changed.status === 'Completed');
}

/* ─── SEARCH ─── */
function handleSearch(val) { searchQuery = val; render(); }

/* ─── SHEET LOADING ─── */
async function loadSheet() {
  showLoading(true);
  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    chapters = buildChapters(parseCSV(text));
    save();
    render();
    const { total } = getStats();
    document.getElementById('sheet-label').textContent = `Striver's DSA Sheet · ${total} problems`;
    showToast(`✓ Loaded ${total} problems`, true);
  } catch(e) {
    showToast('Failed to load sheet. Check connection.');
    console.error(e);
  } finally {
    showLoading(false);
    btn.disabled = false;
  }
}

function clearLocal() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  chapters = [];
  searchQuery = '';
  document.getElementById('search-input').value = '';
  render();
  showToast('Progress reset.');
}

/* ─── UI HELPERS ─── */
function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }

let toastTimer;
function showToast(msg, success = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (success ? ' success' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ─── BOOT ─── */
(function init() {
  if (loadFromStorage()) {
    const { total } = getStats();
    if (total > 0) document.getElementById('sheet-label').textContent = `Striver's DSA Sheet · ${total} problems`;
    render();
  } else {
    updateStats();
  }
})();
</script>
</body>
</html>
